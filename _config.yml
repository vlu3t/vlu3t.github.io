# Welcome to Jekyll!
title: "Abdelrahman Tamam"
subtitle: "Godot Developer & Game Programmer"
description: "Portfolio of games and tools built with Godot"
minimal_mistakes_skin: "dark"   # try: default, air, contrast, dark, dirt, neon, mint, plum, sunrise, aqua
locale: "en-US"
url: "https://vlu3t.github.io"   # <-- replace with your actual GitHub Pages URL

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Asia/Qatar

include:
  - _pages

# Collections
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Abdelrahman Tamam"
  bio: "Programmer making games with Godot"
  location: "Doha, Qatar"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/YOUR_ACTUAL_USERNAME"
    - label: "itch.io"
      icon: "fas fa-fw fa-gamepad"
      url: "https://YOUR_ACTUAL_USERNAME.itch.io"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/YOUR_ACTUAL_USERNAME"
    - label: "itch.io"
      icon: "fas fa-fw fa-gamepad"
      url: "https://YOUR_ACTUAL_USERNAME.itch.io"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
